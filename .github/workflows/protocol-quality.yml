name: Protocol Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  protocol-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate agent-card and protocol backlog contracts
        run: |
          pytest tests/test_agent_card_contract.py tests/test_protocol_backlog_completeness.py
