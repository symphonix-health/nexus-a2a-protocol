name: Protocol Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  protocol-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate agent-card and protocol backlog contracts
        run: |
          pytest tests/test_agent_card_contract.py tests/test_protocol_backlog_completeness.py

      - name: Run SDK transport harness (smoke)
        env:
          SDK_HARNESS_MODE: mock
          SDK_HARNESS_PROFILE: smoke
        run: |
          pytest tests/test_sdk_factory.py tests/test_sdk_types.py tests/test_mcp_adapter_shim.py tests/sdk_harness/test_sdk_transport.py

      - name: Run SDK transport harness (full)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          SDK_HARNESS_MODE: mock
          SDK_HARNESS_PROFILE: full
        run: |
          pytest tests/sdk_harness/test_sdk_transport.py

  sdk-wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Install built wheel
        run: |
          pip install --force-reinstall dist/*.whl

      - name: Verify installed package import path
        run: |
          python -c "import pathlib, nexus_a2a_protocol as p; path=str(pathlib.Path(p.__file__)); print(path); assert '/site-packages/' in path or '\\\\site-packages\\\\' in path"

      - name: Run installed-wheel SDK smoke
        run: |
          python tools/sdk_wheel_smoke.py
