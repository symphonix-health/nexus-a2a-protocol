# Mosquitto MQTT Broker Configuration for HelixCare
# Simple configuration for development and testing

# Listen on all interfaces
listener 1883
protocol mqtt

# WebSocket support
listener 9001
protocol websockets

# Allow anonymous connections (for development)
# In production, configure authentication
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections -1connection_messages true

# Topics for HelixCare agent communication
# nexus/surveillance/+/req
# nexus/surveillance/+/resp
# nexus/osint/+/req
# nexus/osint/+/resp
