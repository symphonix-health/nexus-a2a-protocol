# HelixCare AI Hospital – Docker Compose Configuration
# Complete autonomous hospital deployment with all 13 agents + supporting infrastructure

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════
  # Supporting Infrastructure
  # ═══════════════════════════════════════════════════════════════════
  
  redis:
    image: redis:7-alpine
    container_name: helixcare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - helixcare-network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: helixcare-mosquitto
    ports:
      - "1883:1883"  # MQTT
      - "9001:9001"  # MQTT over WebSocket
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - helixcare-network

  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: helixcare-fhir
    ports:
      - "8080:8080"
    environment:
      - hapi.fhir.default_encoding=json
      - hapi.fhir.enforce_referential_integrity_on_write=false
      - hapi.fhir.enforce_referential_integrity_on_delete=false
    volumes:
      - fhir-data:/data/hapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - helixcare-network

  # Optional: Keycloak for OIDC (enterprise identity management)
  # Uncomment for production deployment with RS256 JWT
  # keycloak:
  #   image: quay.io/keycloak/keycloak:24.0
