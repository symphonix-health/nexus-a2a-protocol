  # ═══════════════════════════════════════════════════════════════════
  # ED Triage Department Agents
  # ═══════════════════════════════════════════════════════════════════

  openhie-mediator:
    build:
      context: .
      dockerfile: demos/ed-triage/openhie-mediator/Dockerfile
    container_name: helixcare-openhie-mediator
    environment:
      - PORT=8023
      - NEXUS_JWT_SECRET=${NEXUS_JWT_SECRET}
      - NEXUS_REQUIRED_SCOPE=nexus:invoke
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
      - REDIS_URL=redis://redis:6379
      - DID_VERIFY=${DID_VERIFY:-false}
      - AGENT_NAME=openhie-mediator
    ports:
      - "8023:8023"
    depends_on:
      hapi-fhir:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8023/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - helixcare-network
    restart: unless-stopped

  diagnosis-agent:
    build:
      context: .
      dockerfile: demos/ed-triage/diagnosis-agent/Dockerfile
