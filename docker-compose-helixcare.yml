  #     - KC_DB_USERNAME=keycloak
  #     - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak}
  #   command: start-dev
  #   ports:
  #     - "8081:8080"
  #   depends_on:
  #     - keycloak-db
  #   networks:
  #     - helixcare-network

  # keycloak-db:
  #   image: postgres:16-alpine
  #   container_name: helixcare-keycloak-db
  #   environment:
  #     - POSTGRES_DB=keycloak
