      - NEXUS_JWT_SECRET=${NEXUS_JWT_SECRET}
      - NEXUS_REQUIRED_SCOPE=nexus:invoke
      - NEXUS_OPENHIE_RPC=http://openhie-mediator:8023/rpc
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - REDIS_URL=redis://redis:6379
      - DID_VERIFY=${DID_VERIFY:-false}
      - AGENT_NAME=diagnosis-agent
    ports:
      - "8022:8022"
    depends_on:
      openhie-mediator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8022/health"]
