version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./tools/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  hospital-reporter:
    build:
      context: ../../
      dockerfile: demos/public-health-surveillance/hospital-reporter/Dockerfile
    ports:
      - "8051:8051"
    env_file: .env
    environment:
      - PORT=8051
      - AGENT_NAME=hospital-reporter
      - REDIS_URL=redis://redis:6379
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_started

  osint-agent:
    build:
      context: ../../
      dockerfile: demos/public-health-surveillance/osint-agent/Dockerfile
    ports:
      - "8052:8052"
    env_file: .env
    environment:
      - PORT=8052
      - AGENT_NAME=osint-agent
      - REDIS_URL=redis://redis:6379
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_started

  central-surveillance:
    build:
      context: ../../
      dockerfile: demos/public-health-surveillance/central-surveillance/Dockerfile
    ports:
      - "8053:8053"
    env_file: .env
    environment:
      - PORT=8053
      - AGENT_NAME=central-surveillance
      - HOSPITAL_REPORTER_URL=http://hospital-reporter:8051
      - OSINT_AGENT_URL=http://osint-agent:8052
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - REDIS_URL=redis://redis:6379
    depends_on:
      mosquitto:
        condition: service_healthy
      hospital-reporter:
        condition: service_started
      osint-agent:
        condition: service_started
      redis:
        condition: service_started

  command-centre:
    build:
      context: ../../
      dockerfile: shared/command-centre/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_URLS=http://hospital-reporter:8051,http://osint-agent:8052,http://central-surveillance:8053
      - UPDATE_INTERVAL_MS=2000
    ports: ["8099:8099"]
    depends_on:
      - redis
      - hospital-reporter
      - osint-agent
      - central-surveillance
