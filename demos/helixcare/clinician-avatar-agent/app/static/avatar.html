<body>
  <header class="topbar">
    <h1>Clinician Console</h1>
    <div class="controls">
      <label>
        Clinician
        <select id="avatar-select">
          <option value="male_black">Male · Black</option>
          <option value="male_white">Male · White</option>
          <option value="female_black">Female · Black</option>
          <option value="female_white">Female · White</option>
        </select>
      </label>
      <label>
        Voice
        <select id="voice-select">
          <option value="coral" selected>coral (realtime)</option>
          <option value="alloy">alloy (realtime)</option>
          <option value="ash">ash (realtime)</option>
          <option value="ballad">ballad (realtime)</option>
          <option value="sage">sage (realtime)</option>
          <option value="shimmer">shimmer (standard TTS)</option>
          <option value="nova">nova (standard TTS)</option>
          <option value="echo">echo (standard TTS)</option>
        </select>
      </label>
      <label>
        Render
        <select id="render-mode-select">
          <option value="static" selected>Static image + lip-sync</option>
          <option value="video">Video loop</option>
        </select>
      </label>
      <button id="start-btn" type="button">Start Session</button>
      <button id="audio-enable-btn" type="button" title="Enable speech output">Enable Audio</button>
      <button id="export-transcript-btn" type="button" title="Download consultation transcript" disabled>Export Transcript</button>
      <button id="panel-toggle-btn" class="nx-theme-toggle" title="Show/hide session controls" aria-expanded="true" aria-controls="side-panel">⊟</button>
      <button id="theme-toggle" class="nx-theme-toggle" title="Toggle light / dark mode" aria-label="Toggle light/dark mode">🌙</button>
    </div>
  </header>

  <main class="layout">
    <section class="avatar-panel">
      <!-- Video + canvas overlay are injected by AvatarRenderer.init() -->
      <div id="avatar-canvas"></div>
      <div class="avatar-footer">
        <div id="status-pill" class="pill">No session</div>
        <div id="avatar-state-bar" class="state-bar" aria-live="polite"></div>
      </div>
    </section>

    <section class="chat-panel">
      <div id="chat-log" class="chat-log"></div>
      <div class="patient-tools" aria-label="Patient speaking tools">
        <div class="patient-mode-row" role="group" aria-label="Patient mode">
          <span class="mode-label">Patient Mode:</span>
          <label class="inline-check mode-opt" title="Real patient types or speaks their responses">
            <input id="patient-mode-human" name="patient-mode" type="radio" value="human" checked />
            👤 Human Patient
          </label>
          <label class="inline-check mode-opt" title="AI generates realistic patient replies">
            <input id="patient-mode-ai" name="patient-mode" type="radio" value="ai" />
            🤖 AI Roleplay
          </label>
        </div>

        <!-- AI Roleplay controls (enabled when AI mode is selected) -->
        <div class="ai-patient-controls">
          <label>
            Scenario
            <select id="scenario-select" disabled>
              <option value="">Select patient persona…</option>
            </select>
          </label>
          <button id="ai-patient-respond-btn" type="button" disabled
            title="Generate an AI patient response to the last clinician message">
            💬 AI Patient Respond
          </button>
          <label class="inline-check" title="Auto-generate patient response after each clinician turn">
            <input id="auto-roleplay-toggle" type="checkbox" disabled />
            Auto role-play
          </label>
        </div>

        <!-- Human patient controls -->
        <div class="human-patient-controls">
          <label class="upload-inline">
            Upload audio
            <input id="audio-upload-input" type="file" accept="audio/*" />
          </label>
          <label class="inline-check"
            title="Speak typed patient text aloud using shimmer voice (requires OPENAI_API_KEY)">
            <input id="patient-tts-toggle" type="checkbox" checked />
            Speak patient text (shimmer)
          </label>
        </div>
      </div>
      <div id="patient-context-bar" class="tiny-meta" aria-live="polite" style="display:none"></div>
      <div class="composer">
        <input id="chat-input" placeholder="Type patient response…" autocomplete="off" />
        <button id="mic-btn" type="button" title="Speak patient message">🎤 Speak</button>
        <button id="send-btn" type="button">Send</button>
      </div>
    </section>

    <aside class="side-panel" id="side-panel">
      <h3>Framework Progress</h3>
      <pre id="framework-state">{}</pre>
      <div class="llm-controls">
        <h4>Dialogue Variability</h4>
        <label class="inline-check">
          <input id="registration-first-toggle" type="checkbox" checked />
          Registration-first mode (demographics + consent before triage)
        </label>
        <label class="inline-check">
          <input id="nondeterministic-toggle" type="checkbox" checked />
          Enable non-deterministic clinician responses
        </label>
        <label>
          Temperature
          <input id="temperature-input" type="range" min="0" max="1.2" step="0.1" value="0.7" />
        </label>
        <div id="temperature-value" class="tiny-meta">0.7</div>
      </div>
    </aside>
  </main>

  <script src="/static/avatar_renderer.js?v=10"></script>
  <script src="/static/lipsync_engine.js?v=10"></script>
  <script src="/static/realtime_client.js?v=10"></script>
  <script src="/static/tts_client.js?v=9"></script>
  <script src="/static/chat_controller.js?v=9"></script>
  <script>
    (function () {
      // Theme toggle
      const KEY = 'nexus-theme';
      const btn = document.getElementById('theme-toggle');
      function applyTheme(light) {
        document.documentElement.dataset.theme = light ? 'light' : '';
        btn.textContent = light ? '☀️' : '🌙';
        btn.title = light ? 'Switch to dark mode' : 'Switch to light mode';
      }
      const stored = localStorage.getItem(KEY);
      applyTheme(stored ? stored === 'light' : window.matchMedia('(prefers-color-scheme: light)').matches);
      btn.addEventListener('click', function () {
        const next = document.documentElement.dataset.theme !== 'light';
        localStorage.setItem(KEY, next ? 'light' : 'dark');
        applyTheme(next);
      });

      // Side panel collapse/expand
      const panelBtn = document.getElementById('panel-toggle-btn');
      const sidePanel = document.getElementById('side-panel');
      const PANEL_KEY = 'nexus-side-panel';
      function applyPanel(open) {
        sidePanel.classList.toggle('collapsed', !open);
        panelBtn.textContent = open ? '⊟' : '⊞';
        panelBtn.title = open ? 'Hide session controls' : 'Show session controls';
        panelBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      }
      applyPanel(localStorage.getItem(PANEL_KEY) !== 'closed');
      panelBtn.addEventListener('click', function () {
        const next = sidePanel.classList.contains('collapsed');
        localStorage.setItem(PANEL_KEY, next ? 'open' : 'closed');
        applyPanel(next);
      });
    })();
  </script>
</body>

</html>
