<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinician Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <!-- Three.js removed — avatar now uses a real video element (avatar_renderer.js) -->
</head>

<body>
  <header class="topbar">
    <h1>Clinician Console</h1>
    <div class="controls">
      <label>
        Avatar
        <select id="avatar-select">
          <option value="male_black">Male · Black</option>
          <option value="male_white">Male · White</option>
          <option value="female_black">Female · Black</option>
          <option value="female_white">Female · White</option>
        </select>
      </label>
      <label>
        Voice
        <select id="voice-select">
          <option value="nova" selected>nova</option>
          <option value="alloy">alloy</option>
          <option value="echo">echo</option>
          <option value="shimmer">shimmer</option>
        </select>
      </label>
      <label>
        Render
        <select id="render-mode-select">
          <option value="static" selected>Static image + lip-sync</option>
          <option value="video">Video loop</option>
        </select>
      </label>
      <button id="start-btn" type="button">Start Session</button>
      <button id="audio-enable-btn" type="button" title="Enable speech output">Enable Audio</button>
    </div>
  </header>

  <main class="layout">
    <section class="avatar-panel">
      <!-- Video + canvas overlay are injected by AvatarRenderer.init() -->
      <div id="avatar-canvas"></div>
      <div class="avatar-footer">
        <div id="status-pill" class="pill">No session</div>
        <div id="avatar-state-bar" class="state-bar" aria-live="polite"></div>
      </div>
    </section>

    <section class="chat-panel">
      <div id="chat-log" class="chat-log"></div>
      <div class="patient-tools" aria-label="Patient speaking tools">
        <label>
          Script
          <select id="script-line-select">
            <option value="">Select a guided patient line…</option>
          </select>
        </label>
        <button id="use-script-btn" type="button">Use Script Line</button>
        <button id="play-script-clip-btn" type="button">Play Sample Clip</button>
        <label class="upload-inline">
          Upload audio
          <input id="audio-upload-input" type="file" accept="audio/*" />
        </label>
      </div>
      <div id="script-line-meta" class="tiny-meta" aria-live="polite"></div>
      <div class="composer">
        <input id="chat-input" placeholder="Type patient response…" autocomplete="off" />
        <button id="mic-btn" type="button" title="Speak patient message">🎤 Speak</button>
        <button id="send-btn" type="button">Send</button>
      </div>
    </section>

    <aside class="side-panel">
      <h3>Framework Progress</h3>
      <pre id="framework-state">{}</pre>
      <div class="llm-controls">
        <h4>Dialogue Variability</h4>
        <label class="inline-check">
          <input id="registration-first-toggle" type="checkbox" checked />
          Registration-first mode (demographics + consent before triage)
        </label>
        <label class="inline-check">
          <input id="nondeterministic-toggle" type="checkbox" checked />
          Enable non-deterministic clinician responses
        </label>
        <label>
          Temperature
          <input id="temperature-input" type="range" min="0" max="1.2" step="0.1" value="0.7" />
        </label>
        <div id="temperature-value" class="tiny-meta">0.7</div>
      </div>
    </aside>
  </main>

  <!-- MediaPipe FaceMesh — landmark detection for driven lip-sync -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"
    crossorigin="anonymous"></script>
  <script src="/static/avatar_renderer.js?v=7"></script>
  <script src="/static/lipsync_engine.js?v=5"></script>
  <script src="/static/tts_client.js?v=6"></script>
  <script src="/static/chat_controller.js?v=6"></script>
</body>

</html>
