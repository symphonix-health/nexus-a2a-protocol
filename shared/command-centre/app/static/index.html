<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-A2A Command Centre</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="dashboard-header">
            <h1>🎛️ NEXUS-A2A Command Centre</h1>
            <div class="header-status">
                <span id="connection-status" class="status-dot"></span>
                <span id="connection-text">Connecting...</span>
            </div>
        </header>

        <!-- Main Content Grid -->
        <div class="dashboard-content">
            <!-- Topology Panel (Top) -->
            <section class="panel topology-panel">
                <h2>Network Topology</h2>
                <div id="topology-container">
                    <svg id="topology-svg" width="100%" height="400"></svg>
                </div>
            </section>

            <!-- Heatmap Grid (Middle) -->
            <section class="panel heatmap-panel">
                <h2>Agent Metrics Heatmap</h2>
                <div id="heatmap-container">
                    <table id="heatmap-table" class="heatmap-table">
                        <thead>
                            <tr>
                                <th>Metric</th>
                                <!-- Agent columns populated dynamically -->
                            </tr>
                        </thead>
                        <tbody>
                            <tr data-metric="throughput">
                                <td class="metric-label">Throughput</td>
                            </tr>
                            <tr data-metric="latency">
                                <td class="metric-label">Latency (ms)</td>
                            </tr>
                            <tr data-metric="error-rate">
                                <td class="metric-label">Error Rate</td>
                            </tr>
                            <tr data-metric="status">
                                <td class="metric-label">Status</td>
                            </tr>
                            <tr data-metric="last-activity">
                                <td class="metric-label">Last Activity</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Timeline Panel (Right Sidebar) -->
            <aside class="panel timeline-panel">
                <h2>Event Timeline</h2>
                <div class="timeline-filters">
                    <label>
                        <input type="checkbox" checked data-filter="accepted"> Accepted
                    </label>
                    <label>
                        <input type="checkbox" checked data-filter="working"> Working
                    </label>
                    <label>
                        <input type="checkbox" checked data-filter="final"> Final
                    </label>
                    <label>
                        <input type="checkbox" checked data-filter="error"> Error
                    </label>
                </div>
                <div id="timeline-container" class="timeline-events">
                    <!-- Events populated dynamically -->
                </div>
            </aside>
        </div>

        <!-- Performance Dashboard (Bottom, Collapsible) -->
        <section class="panel performance-panel collapsed">
            <h2>
                Performance Charts
                <button id="toggle-performance" class="toggle-btn">▼</button>
            </h2>
            <div id="performance-charts" class="charts-container">
                <div class="chart-box">
                    <h3>System Throughput</h3>
                    <canvas id="throughput-chart" width="400" height="200"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Latency Distribution</h3>
                    <canvas id="latency-chart" width="400" height="200"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Agent Load Balance</h3>
                    <canvas id="load-chart" width="400" height="200"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Error Budget</h3>
                    <canvas id="error-gauge" width="200" height="200"></canvas>
                </div>
            </div>
        </section>
    </div>

    <!-- Toast Notifications  -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="/colors.js"></script>
    <script src="/dashboard.js"></script>
</body>
</html>
