<!--
  NEXUS A2A Protocol — Logo
  Built from design-template/src/logo-template.svg
  Shield + network motif + healthcare cross + wordmark
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Primary gradient — fills the shield container -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0D7377;stop-opacity:1"/>   <!-- brand-600 -->
      <stop offset="100%" style="stop-color:#14919B;stop-opacity:1"/>   <!-- brand-500 -->
    </linearGradient>

    <!-- Overlay gradient — wireframe/decorative lines inside shield -->
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#E0F7FA;stop-opacity:0.9"/> <!-- brand-50  -->
      <stop offset="100%" style="stop-color:#B2EBF2;stop-opacity:0.7"/> <!-- brand-100 -->
    </linearGradient>

    <!-- Node/accent gradient — focal points, dots, key shapes -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#4DD0E1;stop-opacity:1"/>   <!-- brand-300 -->
      <stop offset="100%" style="stop-color:#00ACC1;stop-opacity:1"/>   <!-- brand-400 -->
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 1: Shield container (shared silhouette — do not change shape)   -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <path d="M60,12 L92,24 L92,52 C92,76 60,100 60,100 C60,100 28,76 28,52 L28,24 Z"
        fill="url(#shieldGrad)" stroke="#095E61" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 2: Inner icon — API gateway / radiating spokes (A2A protocol)   -->
  <!--          Safe area: 44×44 circle centred at (60, 52)                  -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Concentric rings — representing protocol layers -->
  <circle cx="60" cy="52" r="22" fill="none" stroke="url(#overlayGrad)" stroke-width="0.8" opacity="0.5"/>
  <circle cx="60" cy="52" r="14" fill="none" stroke="url(#overlayGrad)" stroke-width="0.8" opacity="0.6"/>

  <!-- Radiating spokes — representing agent connections -->
  <line x1="60" y1="52" x2="60" y2="30" stroke="#B2EBF2" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="52" x2="79" y2="41" stroke="#B2EBF2" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="52" x2="79" y2="63" stroke="#B2EBF2" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="52" x2="60" y2="74" stroke="#B2EBF2" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="52" x2="41" y2="63" stroke="#B2EBF2" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="52" x2="41" y2="41" stroke="#B2EBF2" stroke-width="1" opacity="0.8"/>

  <!-- Outer agent nodes -->
  <circle cx="60" cy="30" r="3" fill="url(#nodeGrad)" stroke="#fff" stroke-width="0.8"/>
  <circle cx="79" cy="41" r="3" fill="url(#nodeGrad)" stroke="#fff" stroke-width="0.8"/>
  <circle cx="79" cy="63" r="3" fill="url(#nodeGrad)" stroke="#fff" stroke-width="0.8"/>
  <circle cx="60" cy="74" r="3" fill="url(#nodeGrad)" stroke="#fff" stroke-width="0.8"/>
  <circle cx="41" cy="63" r="3" fill="url(#nodeGrad)" stroke="#fff" stroke-width="0.8"/>
  <circle cx="41" cy="41" r="3" fill="url(#nodeGrad)" stroke="#fff" stroke-width="0.8"/>

  <!-- Centre hub — hero element (white-filled) -->
  <circle cx="60" cy="52" r="5" fill="#fff" stroke="#00ACC1" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 3: Domain badge — healthcare cross at shield base               -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="57" y="78" width="6"  height="14" rx="1" fill="#E0F7FA" opacity="0.85"/>
  <rect x="53" y="82" width="14" height="6"  rx="1" fill="#E0F7FA" opacity="0.85"/>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- LAYER 4: Wordmark — NEXUS + subtitle                                 -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Project name -->
  <text x="120" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="700" letter-spacing="4" fill="#0D7377">
    NEXUS
  </text>

  <!-- Accent line -->
  <line x1="120" y1="64" x2="340" y2="64" stroke="#14919B" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle line 1 -->
  <text x="121" y="78" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="400" letter-spacing="1.8" fill="#5C8A8C">
    AGENT-TO-AGENT PROTOCOL
  </text>

  <!-- Subtitle line 2 -->
  <text x="121" y="91" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="400" letter-spacing="1.8" fill="#5C8A8C">
    &amp; HEALTHCARE INTELLIGENCE
  </text>
</svg>
